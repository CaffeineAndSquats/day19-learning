name: Issue Automation

on:
  issues:
    types: [opened]

jobs:
  assign_priority:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Add default priority label to new issues
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            
            // Check if issue already has a priority label
            const hasPriority = issue.labels.some(label => 
              label.name.startsWith('priority-')
            );
            
            // If no priority label, add default
            if (!hasPriority) {
              github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: ['priority-medium']
              });
              
              console.log('Added priority-medium label to issue #' + issue.number);
            }